name: Release Draft

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete any existing draft release to avoid duplicates
          gh release list --json tagName,isDraft \
            | jq -r '.[] | select(.isDraft) | .tagName' \
            | xargs -I{} gh release delete {} --yes --cleanup-tag 2>/dev/null || true

          # Determine next patch version from latest semver tag
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d v)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          gh release create "$NEXT" \
            --draft \
            --title "$NEXT" \
            --notes "Release $NEXT"
